<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SilkPlot — fast, fluid data visualization for Solid</title>
    <meta
      name="description"
      content="SilkPlot is an open-source Solid charting library. D3 computes, Solid renders — no second renderer fights Solid for the DOM."
    />
    <meta name="color-scheme" content="light dark" />
    <script>
      // Re-apply a saved explicit scheme before first paint, so a dark-choice
      // visitor never sees a light flash. "System" stores nothing and the
      // attribute stays off, which is what keeps the page following the OS.
      try {
        const t = localStorage.getItem("sp-theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-sp-theme", t);
      } catch {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="preload" href="/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/geist-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/geist-mono-latin.woff2" as="font" type="font/woff2" crossorigin />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://silkplot.com" />
    <meta property="og:title" content="SilkPlot — fast, fluid data visualization for Solid" />
    <meta
      property="og:description"
      content="D3 computes, Solid renders. An open-source Solid charting library with accessibility and interaction built in."
    />
    <meta property="og:image" content="https://silkplot.com/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://silkplot.com/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
