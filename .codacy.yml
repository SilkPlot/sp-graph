# ---------------------------------------------------------------------------
# Excluded paths — generated and vendored output only
# ---------------------------------------------------------------------------
# This is the repository-wide exclusion: it removes a path from EVERY analysis,
# quality and security included. Everything below is a build artifact, a
# dependency lockfile, or a binary snapshot. None of it is authored, so analysing
# it measures a generator rather than the code, and its findings drown the ones a
# person can act on.
#
# No test path belongs here, and none is listed. Tests are narrowed in scope by
# the `engines:` block above, for two named metrics, and are otherwise analysed
# in full. Excluding them wholesale to lift a percentage would be exactly the
# silencing this file exists to avoid.
#
# Patterns use Java glob syntax, which is what Codacy matches these against.
# (The literal paths under `engines:` above are literal for a documented reason —
# see the note there. This section is the one where globs work.)
exclude_paths:
  # npm's resolution lockfile. Flagged at 4,966 lines; it is machine-written and
  # a person editing it by hand would be the bug.
  - "package-lock.json"

  # Compiled output. `tsc -b` emits it, `npm run clean` deletes it, and CI
  # rebuilds it from scratch every run — analysing it analyses the compiler.
  - "**/dist/**"
  - "**/.tsbuild/**"

  # Coverage and test-run artifacts, written by Vitest.
  - "coverage/**"
  - ".vitest-attachments/**"

  # `npm pack` staging for the release gate — tarball contents, not source.
  - ".release-staging/**"

  # Visual-regression PNGs: pinned pixel snapshots and the per-run
  # expected/actual/diff triptychs generated against them.
  - "test/visual/baselines/**"
  - "test/visual/.output/**"
  - "test/visual/.report/**"
