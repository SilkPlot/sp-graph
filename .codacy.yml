---
# Codacy analysis configuration.
#
# The rule this file is written under: a finding is never silenced because it is
# inconvenient. A finding is fixed, or it stays open and visible. What IS in
# scope here is correcting a tool that is structurally incapable of being right
# about this codebase, and excluding files that are generated rather than
# authored. Those are configuration, not suppression, and the difference is
# recorded below for every entry so a later reader can tell them apart without
# having to ask anyone.
#
# ---------------------------------------------------------------------------
# WHAT THIS FILE CANNOT DO — read before adding a tool disable here
# ---------------------------------------------------------------------------
# Codacy's configuration file can configure tools; it cannot enable or disable
# them, and it has no per-pattern disable at all. That is documented, not
# inferred: "The Codacy configuration file lets you configure tools, but you
# can't enable or disable them. A tool can only be enabled or disabled on the
# Code patterns page." A tool or pattern disable written into this file is
# ignored silently — it looks like it worked and changes nothing, which is worse
# than not writing it.
#
# So the two tool dispositions this repository has decided on live on the Code
# patterns page, and their JUSTIFICATION lives here, because the repository is
# where a reader looks for why:
#
#   1. ESLint — DISABLED for this repository.
#      Codacy runs base ESLint 8, not @typescript-eslint, so it has no concept
#      of TypeScript type-level parameter names. Every one of its 47
#      `no-unused-vars` findings here is on a TYPE SIGNATURE, not on code:
#      `packages/core/src/shape.ts:61` is the interface member
#      `y1: (d: Datum, index: number) => number;`, where `d` and `index` are
#      documentation inside a function type and there is no variable that could
#      be unused; `packages/core/src/ticks.ts:102` is the type annotation
#      `(v: Date) => string`. This repository's linter is Biome (`biome.jsonc`),
#      which is TypeScript-aware and runs `--error-on-warnings` in CI, and `tsc`
#      typechecks both `src/` and `test/`. ESLint is redundant where it happens
#      to be right and wrong where it is not.
#
#   2. Agentlinter `clarity/escape-hatch-missing` — DISABLED, applied and
#      VERIFIED on 2026-07-19 by watching its six findings clear from the
#      repository's issue list (14 open to 7). It had been documented as
#      disabled for days while still enabled; the disable is now real.
#      It flags absolute rules that carry no escape hatch, on `AGENTS.md`
#      (lines 6, 9, 12, 18, 19) and `CLAUDE.md` (line 6) — including the heading
#      "The rules that never bend" and "Never use `d3-selection`,
#      `d3-transition`, or `d3-axis`". Those rules are absolute deliberately.
#      The banned-module rule is the architectural invariant the whole library
#      rests on; hedging it would be a defect, not an improvement. This is the
#      tool contradicting a decision, not finding a mistake.
#
# Lizard is deliberately NOT touched — not disabled, and its thresholds not
# raised. Its complexity findings on production code are real signal and are left
# open on purpose: `packages/charts/src/LineChart.tsx:117` (`LineChartBody`, 80
# lines against a limit of 50) is the only one in shipped library code and is the
# one that matters; `playground/src/App.tsx:558` and
# `scripts/release-consumer.mjs:267` are the rest. Refactoring them is real work
# with test implications and belongs in its own change. Until then they stay
# visible, which is the point. What Lizard no longer measures is test code, for
# the reasons set out under "Analysis scope" below.
#
# ---------------------------------------------------------------------------
# Analysis scope — which measurements apply to test code
# ---------------------------------------------------------------------------
# Test files stay in QUALITY and SECURITY analysis. They are authored code, they
# are linted by Biome and typechecked by `tsc` like everything else, and a real
# defect in a test is a real defect. Nothing below removes them from that.
#
# What the `engines:` block below does remove them from is DUPLICATION and
# CYCLOMATIC COMPLEXITY. That is a scope decision about what those two metrics
# can meaningfully say, not a way of moving a number:
#
#   - Duplication detection assumes repetition is a maintenance liability. In
#     test code the assumption inverts. A test is read far more often than it is
#     changed, and it is read by someone trying to work out what the system is
#     supposed to do — so each test should be self-contained enough to be
#     understood without jumping elsewhere. Google's testing guidance names this
#     directly: prefer DAMP (Descriptive And Meaningful Phrases) over DRY in
#     tests, because a reader forced to mentally execute a shared helper is
#     reading an implementation instead of a specification.
#     https://testing.googleblog.com/2019/12/testing-on-toilet-tests-too-dry-make.html
#     SonarQube documents the same rationale for the same exclusion — test code
#     contains intentional repetition, so duplication findings on it are noise.
#     https://docs.sonarsource.com/sonarqube-server/instance-administration/analysis-functions/analysis-scope/exclude-from-coverage-duplication
#
#   - Complexity, likewise, measures how hard code is to reason about and change.
#     A suite that walks every scheme against every contrast mode against every
#     chart family is branchy because the specification is a matrix, and pushing
#     that matrix behind abstraction to lower a branch count would make the suite
#     harder to read, not easier to change.
#
# OPEN FINDING — the `metric` exclusion does not reach Lizard. Now DIAGNOSED,
# and a fix is under test.
#
# `site/test/site.test.tsx` was in both lists below and Lizard still reported
# `Lizard_nloc-medium` against it ("86 lines of code, limit is 50"). Installing
# the Codacy CLI locally explained why: Lizard is its own TOOL, with its own
# generated configuration at `.codacy/tools-configs/lizard.yaml`, and is not part
# of the `metric` engine at all. The metric scope was never going to reach it.
#
# A local run reproduces the underlying measurement — an 88-NLOC anonymous
# function at line 34, which is the `describe` block — while NOT flagging it,
# because the CLI applies Lizard's own defaults (nloc > 1000000) rather than
# Codacy's configured threshold of 50. So the local tool confirms the fact and
# cannot confirm the disposition; only Codacy's own analysis can.
#
# An `engines.lizard.exclude_paths` block was therefore added below AS A TEST,
# not as an assertion, written to be falsified by the next analysis.
#
# RESULT, 2026-07-19: CONFIRMED. Codacy honours a tool-named key here. Repository
# issues went from 17 to 14 on the merge, and the two that cleared were exactly
# the two predicted — `site/test/site.test.tsx` and
# `packages/theme/test/contrast.test.ts`. The third was an unrelated security fix
# in the same change.
#
# The second of those is the part worth keeping. `contrast.test.ts` had been
# measured by Lizard the entire time, in a repository that believed its test code
# was out of complexity scope. Nothing reported it, because a metric that
# silently measures more than intended does not look like a failure — it looks
# like a number. The scope decision had been correct in `.codacy.yml` and wrong
# in effect for as long as Lizard has been enabled.
#
# CLOSED, 2026-07-19. Both dispositions above are now applied and verified.
#
# The episode is kept because the failure mode is subtle. THIS FILE was wrong:
# it recorded a disable as done that had never been applied.
#
# The contradiction was: `clarity/escape-hatch-missing` documented as disabled,
# six of its findings live. Querying the repository's pattern settings directly
# settled it — the pattern is ENABLED. It was never turned off. The disposition
# above has been corrected to describe an intent rather than a state.
#
# Worth noting how long that survived: a disposition written as a statement of
# fact ("DISABLED") read as done to every subsequent reader, including the one
# who wrote it. Nothing checks that the tool dispositions recorded in this file
# match the dashboard, and until one of its patterns happened to fire on a new
# file, nothing would have.
#
#   3. Stylelint `scss_function-disallowed-list` — DISABLED, applied and
#      verified the same way. It was malformed on Codacy's side, reporting
#      "Unknown rule scss_function-disallowed-list. Did you mean
#      function-disallowed-list?" against a comment on line 1 of
#      `site/src/styles.css`. The message was Stylelint saying the configured
#      rule name does not exist, so it was a configuration defect that no change
#      to any CSS could satisfy. It surfaced only because that is the first
#      stylesheet in the repository.
#
# Codacy provides these as separate, scoped exclusions precisely so this
# distinction can be made — `engines.duplication.exclude_paths` and
# `engines.metric.exclude_paths` are independent of the repository-wide
# `exclude_paths` at the bottom of this file.
# https://docs.codacy.com/repositories-configure/codacy-configuration-file/
# https://docs.codacy.com/repositories-configure/ignoring-files/
#
# This is NOT a licence to stop caring about repetition in tests. Where the
# duplication was construction and verification noise rather than specification,
# it was removed, using the carve-out DAMP itself sanctions: small, named,
# obvious helpers that make the test read BETTER. `packing()` in the core overlap
# tests, and `num()` and `expectNoNaN()` in the charts test support module, are
# that work. They stand, and this scope change does not undo them. The line is
# whether the helper shortens the distance to understanding the assertion or
# lengthens it.
engines:
  # Duplication. Every path below is a TEST file, and none of them is excluded
  # from quality or security analysis — they are still linted, still typechecked,
  # and still scanned. What is switched off here is duplication measurement, and
  # only that.
  #
  # Wildcards are enumerated away deliberately. Codacy documents the restriction
  # explicitly, and it fails silently: "When excluding files from Duplication
  # analysis, you must state the entire path to the files. Unlike quality
  # analysis, wildcards will not work, resulting in files not being excluded."
  # A glob written here would look correct in review and change nothing. So the
  # list is literal, and `scripts/duplication-scope-gate.mjs` fails the build
  # when a test file on disk is missing from it — because an explicit list goes
  # stale the moment someone adds a test, and that drift is invisible for exactly
  # the same reason.
  duplication:
    exclude_paths:
      - "packages/charts/test/AreaChart-reactive.test.tsx"
      - "packages/charts/test/AreaChart.test.tsx"
      - "packages/charts/test/BarChart-reactive.test.tsx"
