<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 126" role="img" aria-labelledby="sp-logo-title">
  <title id="sp-logo-title">SilkPlot</title>
  <!--
    The SilkPlot wordmark: eight letters, eight chart families, one baseline
    axis. The Silk half is bold ribbon-and-solid; the Plot half is thin chart
    linework (neutral geometry carries the iridescent gradients; only glass
    specular dots are white). S = silk spline, i = lollipop, l = 3D bar,
    k = diverging trend lines, P = gauge, l = candlestick, o = donut,
    t = data crosshair. Hand-authored SVG - edit coordinates, do not trace.
  -->
  <defs>
    <linearGradient id="iri" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset=".5" stop-color="#38bdf8"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="iriV" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset=".55" stop-color="#38bdf8"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="ribbon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/><stop offset=".45" stop-color="#e879f9"/><stop offset=".75" stop-color="#38bdf8"/><stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="faceL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6d43d8"/><stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="faceR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22a5d4"/><stop offset="1" stop-color="#1a8fbf"/>
    </linearGradient>
    <linearGradient id="faceR2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#25c2a8"/><stop offset="1" stop-color="#1ba38d"/>
    </linearGradient>
  </defs>

  <!-- shared baseline axis: the wordmark sits on a plot -->
  <path d="M6,112 H434" stroke="rgba(139,92,246,.45)" stroke-width="1.5"/>
  <g stroke="rgba(139,92,246,.45)" stroke-width="1.5">
    <line x1="35" y1="112" x2="35" y2="118"/><line x1="92" y1="112" x2="92" y2="118"/>
    <line x1="136" y1="112" x2="136" y2="118"/><line x1="190" y1="112" x2="190" y2="118"/>
    <line x1="245" y1="112" x2="245" y2="118"/><line x1="284" y1="112" x2="284" y2="118"/>
    <line x1="336" y1="112" x2="336" y2="118"/><line x1="404" y1="112" x2="404" y2="118"/>
  </g>

  <!-- S: the silk spline -->
  <path d="M62,28 C40,18 14,26 14,44 C14,62 58,60 58,80 C58,98 28,104 8,92"
        fill="none" stroke="url(#ribbon)" stroke-width="13" stroke-linecap="round"/>
  <path d="M62,28 C40,18 14,26 14,44 C14,62 58,60 58,80 C58,98 28,104 8,92"
        fill="none" stroke="rgba(255,255,255,.45)" stroke-width="1.4" stroke-linecap="round"/>

  <!-- i: a lollipop chart -->
  <rect x="89" y="54" width="6" height="50" rx="3" fill="url(#iriV)"/>
  <circle cx="92" cy="34" r="9" fill="url(#iriV)"/>
  <circle cx="89.3" cy="31.3" r="2.8" fill="rgba(255,255,255,.85)"/>

  <!-- l: a 3D bar -->
  <polygon points="136,18 150,25 136,32 122,25" fill="url(#iri)"/>
  <polygon points="122,25 136,32 136,104 122,97" fill="url(#faceL)"/>
  <polygon points="150,25 136,32 136,104 150,97" fill="url(#faceR2)"/>

  <!-- k: diverging trend lines off their own axis -->
  <rect x="166" y="26" width="13" height="78" rx="6.5" fill="url(#iriV)"/>
  <path d="M176,66 L212,32" stroke="url(#ribbon)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M176,70 L212,102" stroke="url(#iri)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <circle cx="212" cy="32" r="3.4" fill="rgba(255,255,255,.85)"/>
  <circle cx="212" cy="102" r="3.4" fill="rgba(255,255,255,.85)"/>

  <!-- P: a gauge — thin stem, data arc, needle -->
  <rect x="232" y="26" width="5" height="78" rx="2.5" fill="url(#iriV)"/>
  <path d="M237,33 A19.5,19.5 0 0 1 237,72" stroke="url(#iri)" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M236,52.5 L248,44.5" stroke="#e879f9" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256.5" cy="52.5" r="3" fill="rgba(255,255,255,.9)"/>

  <!-- l: a candlestick — thin wick, narrow body -->
  <rect x="282.5" y="16" width="3" height="92" rx="1.5" fill="url(#iriV)"/>
  <rect x="276" y="40" width="16" height="36" rx="3" fill="url(#faceR2)" stroke="rgba(255,255,255,.4)" stroke-width="1.2"/>

  <!-- o: a donut chart — three arc segments -->
  <g fill="none" stroke-width="7" stroke-linecap="round">
    <path d="M338.2,54.1 A25,25 0 0 1 358.7,89.6" stroke="#8b5cf6"/>
    <path d="M356.5,93.3 A25,25 0 0 1 315.5,93.3" stroke="#38bdf8"/>
    <path d="M313.3,89.6 A25,25 0 0 1 333.8,54.1" stroke="#2dd4bf"/>
  </g>

  <!-- t: a data crosshair with its target ring -->
  <rect x="401" y="24" width="5" height="84" rx="2.5" fill="url(#iriV)"/>
  <rect x="380" y="44" width="48" height="5" rx="2.5" fill="url(#iri)"/>
  <circle cx="403.5" cy="46.5" r="7" fill="none" stroke="#e879f9" stroke-width="3.5"/>
</svg>
