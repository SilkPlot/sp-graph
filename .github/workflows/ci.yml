name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, build & test
    runs-on: ubuntu-latest
    # Restated per job so adding a job cannot silently inherit more than it needs.
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      # `.nvmrc` is the repository's single tool-version file, so CI cannot
      # drift from a local checkout by pinning its own number here. The npm
      # floor lives in the root `engines` field and is enforced by
      # `engine-strict` in `.npmrc`, which makes the install below fail rather
      # than warn on an unsupported toolchain.
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck covers `src` via `tsc -b` and `test/` via the per-package test
      # tsconfigs, which `tsc -b` cannot see: `test/` is deliberately outside
      # each package's `include` so tests are never emitted into `dist`.
      - name: Typecheck
        run: npm run typecheck

      # `npm run build` cleans first, so this is a build from scratch and not an
      # incremental one. That matters: `tsc -b` never deletes, so without the
      # clean a module whose source was deleted stays in `dist` forever.
      - name: Build (clean)
        run: npm run build

      # `tsc -b` above is a validation gate, not a packaging step — it writes a
      # gitignored `dist` nothing consumes. This is the bundle a consumer's
      # bundler actually produces from the packages' TSX source via the "solid"
      # export condition, and it is the only step that would catch a break in
      # that path. CI proved `tsc -b` output and nothing else until now.
      - name: Build the playground production bundle (Vite)
        run: npm run build:playground

      # Two defects that a green test suite cannot see, because the tests run
      # against `src` and both of these live in what the build EMITS: a
      # generated config shadowing `playground/vite.config.ts` (it wins Vite's
      # config search), and a package `dist` file whose source has been deleted.
      # See scripts/build-hygiene-gate.mjs.
      - name: Build hygiene gate (config shadow, stale output)
        run: npm run gate:build-hygiene

      # `.codacy.yml` narrows duplication and complexity analysis away from test
      # code, and Codacy requires those exclusions as literal paths — a glob
      # there matches nothing and reports nothing. An explicit list goes stale
      # the moment a test file is added, and that failure is silent too: the file
      # is simply measured again. This step fails when the lists and the test
      # files on disk disagree. See scripts/duplication-scope-gate.mjs.
      - name: Duplication scope gate (exclusion lists match the tests on disk)
        run: npm run gate:duplication-scope

      # The `solid`, `charts`, and `playground` Vitest projects run in real
      # headless chromium, not jsdom, so the runner needs a browser. Without this
      # step the test job cannot pass — which is exactly why every run before
      # this one went red. (`playground` joined the browser projects with the
      # visible-focus work: a focus ring is a computed style resolved under
      # `:focus-visible`, a media query, and a custom-property cascade, none of
      # which a node environment resolves.)
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # A cache hit restores the browser binaries but not the system libraries
      # they link against, so those are installed either way.
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # The accessibility contract (ADR-0005) gets its own gate rather than
      # relying on the full suite alone. A suite-wide green does not say the
      # accessibility files were among the ones that ran, and deleting a failing
      # test file is the easiest way to make it stop failing — which a
      # suite-wide green reports as a shorter runtime. This step names the
      # suites, fails if any has gone missing, been emptied, or been made
      # unreachable by the project layout, and fails if the workflow stops
      # calling it. See scripts/accessibility-gate.mjs.
      - name: Accessibility gate (suites present and reachable)
        run: npm run gate:accessibility

      # The deterministic accessibility checks, run as their own step so a
      # failure reads as "the accessibility contract regressed" and not as one
      # more red suite. Sequential with the full run below on purpose: two
      # concurrent Vitest browser processes collide on the browser API port, and
      # the collision reports as a connect timeout having executed zero tests.
      - name: Accessibility checks
        run: npm run test:accessibility

      # Coverage now GATES, per package, against floors selected from observed
      # S002/S003 numbers. The floors and the reasoning behind each live in
      # scripts/coverage-floors.mjs; vitest.config.ts imports them so the numbers
      # and their justification cannot drift apart. Per package rather than one
      # aggregate: a single repository-wide percentage is exactly where a stub
      # hides, and `calendar` sits at 0%.
      - name: Test (coverage floors enforced per package)
        run: npm run test:coverage

      # Ships the run above to Codacy so the dashboard reports a real coverage
      # number instead of "not uploaded". It reads `coverage/lcov.info`, which
      # exists because `lcov` was added to the reporter list in
      # `vitest.config.ts` — the other reporters are for humans and for the
      # floors gate, and Codacy can parse none of them.
      #
      # Reporting only. The gate that can fail this job is the per-package
      # floors check in the step above; this step publishes a number and
      # enforces nothing, so it must never be the reason a build goes red.
      #
      # Both guards below are load-bearing. A pull request from a FORK gets no
      # repository secrets, so the token is absent there and the upload must
      # skip rather than fail an outside contributor's build on a credential
      # they were never going to have. And the reporter must not be invoked with
      # nothing to send.
      #
      # The token presence check is its own step because the `secrets` context
      # is NOT available in a step-level `if:` — the contexts allowed there are
      # github, needs, strategy, matrix, job, runner, env, vars, steps, and
      # inputs. Testing `secrets.*` directly in an `if:` is not a stricter guard
      # that happens to work; it is an unrecognised named-value that breaks the
      # workflow parse. `secrets` IS available in a step's `env:`, so the value
      # is read there and re-published as a boolean output that the `if:` below
      # can legally see.
      #
      # Scoped to this one step rather than declared at job level so the token
      # is not present in the environment of `npm ci` and the test steps. This
      # is a public repository running third-party install scripts; the fewer
      # steps that can read a credential, the better. Nothing echoes the value.
      - name: Check for a Codacy token
        id: codacy-token
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -n "$CODACY_PROJECT_TOKEN" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "No Codacy token available (expected on a fork PR) — upload will skip."
          fi

      - name: Upload coverage to Codacy
        if: ${{ steps.codacy-token.outputs.present == 'true' && hashFiles('coverage/lcov.info') != '' }}
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage/lcov.info

  # ---------------------------------------------------------------------------
  # Release gate — the packages proven AFTER the workspace disappears.
  #
  # Its own job, because everything it proves is invisible from inside the
  # workspace. In `build` above, npm links @silkplot/* to the packages next door
  # and TypeScript resolves them through the "source" condition, so a `default`
  # export pointing at TSX, an internal dependency pinned to "*", or a
  # declaration whose source was deleted all resolve perfectly and ship broken.
  #
  # The consumer fixture is created in the RUNNER's temp directory, outside the
  # checkout, and installs the packed tarballs with no `file:` link back to the
  # source tree. Inside the checkout it would resolve through workspace linking
  # and prove nothing — which is the exact failure the pinned-dependency
  # criterion exists to catch, so the gate asserts its own fixture is outside.
  #
  # It runs a browser, so it is a separate job from `build` for the same reason
  # the visual harness is: two Vitest/Playwright browser processes started
  # concurrently collide on the browser API port, and the collision reports as a
  # connect timeout having executed zero tests.
  #
  # This job packs. It never publishes.
  # ---------------------------------------------------------------------------
  release:
    name: Release gate (packed tarballs, external consumer)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Clean, build, pack, allowlist every packed manifest, then install the
      # tarballs into a project outside the workspace and prove BOTH supported
      # resolution paths — "solid" serving TSX source, "default" serving the
      # compiled bundle — through typecheck, a Vite production build, and a real
      # browser that replaces the data and watches the marks follow.
      - name: Release verification
        run: npm run release:verify

  # ---------------------------------------------------------------------------
  # Visual regression — GATING as of 2026-07-18.
  #
  # It ran non-gating (`continue-on-error: true`) from the day the harness
  # landed, because the promotion criterion required three consecutive clean
  # runner executions and the count then stood at ZERO. It has since had SEVEN,
  # read off the run history rather than inferred:
  #
  #   61f4bc6, 8d59f24, 8985986, f7e79fb, cc1bfe9, a33ad0b, 8d84c7d
  #
  # PROMOTION CRITERION 1 — three consecutive clean runner executions: MET, with
  # more than double the margin asked for.
  #
  # PROMOTION CRITERION 2 — baselines generated in THIS runner environment: NOT
  # LITERALLY MET, and deliberately not quietly dropped. They were pinned on a
  # maintainer's Linux workstation and still are. That criterion existed to guard
  # against ONE risk: that font rasterisation differs enough between the
  # workstation and the runner for a strict pixel comparison to disagree. Seven
  # consecutive clean runner executions are direct evidence that it does not —
  # the determinism controls hold across exactly the boundary the criterion was
  # worried about. The criterion was therefore met IN SUBSTANCE, by evidence,
  # rather than by regenerating the baselines. The owner approved promotion on
  # that basis on 2026-07-18. This was a judged decision with evidence behind it,
  # not a criterion that got forgotten.
  #
  # If runner-environment drift ever does appear, the answer is to REGENERATE THE
  # BASELINES ON THE RUNNER — not to demote this gate and not to loosen
  # `threshold` or `maxDiffPixels`. See docs/visual-regression.md.
  #
  # The diff artifacts below still upload `if: always()`, which matters more now
  # than it did before: a blocking gate that fails without publishing the
  # expected/actual/diff triptych is far harder to act on, and the entire review
  # workflow is built on looking at those images.
  #
  # It remains its own job rather than a step in `build` so its browser process
  # can never overlap the Vitest browser projects. Two browser runners started
  # concurrently collide on the browser API port, and the collision reports as a
  # connect timeout having executed zero tests.
  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Invoked directly rather than through a root npm script, so the harness
      # owns its own entry point and nothing else in the repository has to know
      # it exists.
      - name: Visual regression harness
        id: visual
        run: npx playwright test -c playwright.visual.config.ts

      # `if: always()` is load-bearing NOW THAT THIS GATE BLOCKS. The step above
      # is the one that fails the job, so without `always()` the upload would be
      # skipped on exactly the runs whose images somebody needs to look at. A
      # blocking red with no expected/actual/diff triptych attached is a build
      # everyone is stuck on and nobody can diagnose — and re-pinning from a
      # filename instead of a picture is precisely what the review workflow
      # forbids. These artifacts ARE the review.
      - name: Upload diff artifacts
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: visual-regression-diffs
          path: |
            test/visual/.output/
            test/visual/.report/
          if-no-files-found: ignore
          retention-days: 14

      # Points at the images and at the review workflow, because the single most
      # likely reaction to a newly-blocking pixel gate is to reach for
      # `--update-snapshots`, and that is a decision about what "correct" means
      # rather than a way to clear a red run.
      - name: Report outcome
        if: always()
        run: |
          echo "Visual regression outcome: ${{ steps.visual.outcome }}"
          echo "This job GATES as of 2026-07-18, after seven consecutive clean runner runs."
          echo "If it is red: download the visual-regression-diffs artifact and LOOK at the"
          echo "expected/actual/diff triptych before doing anything. Do not re-pin from a"
          echo "filename, and do not widen threshold or maxDiffPixels. The review workflow"
          echo "and the only route to a new baseline are in docs/visual-regression.md."

  # ---------------------------------------------------------------------------
  # Visual baseline guard — a re-pin must carry a written, attributed rationale.
  #
  # `test/visual/baselines/` holds 92 pinned PNGs and one command re-pins all of
  # them. docs/visual-regression.md says the right thing — that
  # `--update-snapshots` is a decision about what "correct" means, and that a
  # green suite afterwards is a tautology — but nothing enforced it. This does:
  # a baseline that changes without a matching entry in the baseline change log,
  # added in the same diff, fails here.
  #
  # Its own job for one reason: it needs the full history. The guard compares
  # `base...HEAD`, so a shallow checkout would find no base, and "cannot see the
  # base" must never be allowed to read as "nothing changed". Giving it a
  # separate checkout keeps `fetch-depth: 0` off the build job, which does not
  # need it. It installs nothing — the guard uses only Node builtins and git.
  # ---------------------------------------------------------------------------
  baselines:
    name: Visual baseline guard (re-pins carry a rationale)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history — the guard diffs against the base)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc

      # `github.event.before` is the commit this branch pointed at BEFORE the
      # push, and it is the only thing that makes this guard work on a
      # push-to-main estate. Without it the guard resolves `origin/main`, which
      # on a push IS the pushed commit, compares HEAD against itself, finds
      # nothing, and prints a pass no matter what the push did to the baselines.
      #
      # It has to be handed over in `env:`. The `github` context is a workflow
      # expression, not a runtime environment variable, so a script cannot read
      # it. `GITHUB_EVENT_NAME` is set by the runner already.
      #
      # The script handles the two cases this value goes bad — the null SHA on a
      # branch's first push, and an unreachable value after a force-push — by
      # falling back to `HEAD~1`, and FAILS if even that does not exist rather
      # than falling back to a ref that would be HEAD.
      - name: Visual baseline guard
        env:
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: npm run gate:visual-baselines

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      # Split deliberately, because one aggregate number cannot be acted on.
      #
      # What SHIPS to a consumer is the production tree, so that audit gates at
      # the lowest severity and blocks the build. Development-only findings do
      # not reach a consumer: the current one is an esbuild dev-server advisory
      # (low, Windows-only, a transitive dev dependency), accepted rather than
      # chased because fixing it churns the lockfile for something no installed
      # package can reach. Reported every run so an accepted finding stays
      # visible, and non-blocking so it cannot be mistaken for a shipping risk.
      - name: Audit production dependencies (blocking)
        run: npm run audit:prod

      - name: Audit dev dependencies (reported, accepted findings do not block)
        run: npm run audit:dev
        continue-on-error: true
