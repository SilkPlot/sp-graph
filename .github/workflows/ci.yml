name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Lint, typecheck, build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Typecheck covers `src` via `tsc -b` and `test/` via the per-package test
      # tsconfigs, which `tsc -b` cannot see: `test/` is deliberately outside
      # each package's `include` so tests are never emitted into `dist`.
      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The `solid` and `charts` Vitest projects run in real headless chromium,
      # not jsdom, so the runner needs a browser. Without this step the test job
      # cannot pass — which is exactly why every run before this one went red.
      - name: Resolve Playwright version
        id: playwright
        run: echo "version=$(node -p "require('playwright/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright.outputs.version }}

      - name: Install Playwright chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # A cache hit restores the browser binaries but not the system libraries
      # they link against, so those are installed either way.
      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Coverage is printed for visibility only. No threshold is enforced — see
      # the `coverage` block in vitest.config.ts.
      - name: Test (with coverage)
        run: npm run test:coverage
